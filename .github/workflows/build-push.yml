name: Build and Push astron Agent Images

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
    branches:
      - main
      - master
      - feature/**
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: true
        type: boolean

concurrency:
  group: build-push-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

env:
  REGISTRY_GHCR: ghcr.io

jobs:
  # ============================================================================
  # Stage 1: Project Detection and Metadata
  # ============================================================================
  detect-and-prepare:
    name: 🔍 Detection & Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      should-push: ${{ steps.meta.outputs.should-push }}
      platforms: ${{ steps.meta.outputs.platforms }}
      cache-suffix: ${{ steps.meta.outputs.cache-suffix }}
      cache-fallback: ${{ steps.meta.outputs.cache-fallback }}
      commit-sha: ${{ steps.meta.outputs.commit-sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Extract metadata
        id: meta
        run: |
          # Version is always latest
          VERSION="latest"

          # Determine if should push (main, master, feature branches, PR, or manual dispatch)
          SHOULD_PUSH="false"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHOULD_PUSH="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/master" ]]; then
            SHOULD_PUSH="true"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == refs/heads/feature/* ]]; then
            SHOULD_PUSH="true"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_PUSH="true"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.push_images }}" == "true" ]]; then
            SHOULD_PUSH="true"
          fi

          # Set platforms (multi-arch builds for better compatibility)
          PLATFORMS="linux/amd64,linux/arm64"

          # Smart cache strategy: set cache suffix and fallback based on scenario
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PR scenario: use pr-NUMBER as cache suffix, fallback to base branch
            CACHE_SUFFIX="pr-${{ github.event.pull_request.number }}"
            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            # Replace slashes with hyphens to avoid special characters
            BASE_BRANCH_SAFE="${BASE_BRANCH//\//-}"
            CACHE_FALLBACK="branch-${BASE_BRANCH_SAFE}"
            COMMIT_SHA="${{ github.event.pull_request.head.sha }}"
            echo "📌 PR #${{ github.event.pull_request.number }} -> base: ${BASE_BRANCH}"
          else
            # Branch push scenario: use branch-{branch_name} as cache suffix
            BRANCH_NAME="${{ github.ref_name }}"
            # Replace slashes with hyphens
            BRANCH_NAME_SAFE="${BRANCH_NAME//\//-}"
            CACHE_SUFFIX="branch-${BRANCH_NAME_SAFE}"
            # Branch build fallback to main (if not main)
            if [[ "${BRANCH_NAME}" == "main" || "${BRANCH_NAME}" == "master" ]]; then
              CACHE_FALLBACK=""
            else
              CACHE_FALLBACK="branch-main"
            fi
            COMMIT_SHA="${{ github.sha }}"
            echo "📌 Branch: ${BRANCH_NAME}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "should-push=$SHOULD_PUSH" >> $GITHUB_OUTPUT
          echo "platforms=$PLATFORMS" >> $GITHUB_OUTPUT
          echo "cache-suffix=$CACHE_SUFFIX" >> $GITHUB_OUTPUT
          echo "cache-fallback=$CACHE_FALLBACK" >> $GITHUB_OUTPUT
          echo "commit-sha=$COMMIT_SHA" >> $GITHUB_OUTPUT

          echo "🏷️ Version: $VERSION"
          echo "📤 Should push: $SHOULD_PUSH"
          echo "🏗️ Platforms: $PLATFORMS"
          echo "💾 Cache suffix: $CACHE_SUFFIX"
          echo "🔄 Cache fallback: ${CACHE_FALLBACK:-none}"
          echo "📝 Commit SHA: $COMMIT_SHA"

  build-core-link:
    name: 🔗 Build Core Link
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-link
          tags: |
            type=raw,value=latest

      - name: Build and push Core Link image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/plugin/link/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=core-link-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=core-link-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,scope=core-link-${{ needs.detect-and-prepare.outputs.cache-suffix }},mode=max

  build-core-aitools:
    name: 🛠️ Build Core AI Tools
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-aitools
          tags: |
            type=raw,value=latest

      - name: Build and push Core AI Tools image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/plugin/aitools/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=core-aitools-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=core-aitools-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,scope=core-aitools-${{ needs.detect-and-prepare.outputs.cache-suffix }},mode=max

  build-core-agent:
    name: 🤖 Build Core Agent
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-agent
          tags: |
            type=raw,value=latest

      - name: Build and push Core Agent image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/agent/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=core-agent-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=core-agent-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,scope=core-agent-${{ needs.detect-and-prepare.outputs.cache-suffix }},mode=max

  build-core-workflow:
    name: ⚡ Build Core Workflow
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-workflow
          tags: |
            type=raw,value=latest

      - name: Build and push Core Workflow image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./core/workflow/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=core-workflow-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=core-workflow-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,scope=core-workflow-${{ needs.detect-and-prepare.outputs.cache-suffix }},mode=max

  build-console-frontend:
    name: 🌐 Build Console Frontend
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/console-frontend
          tags: |
            type=raw,value=latest

      - name: Build and push Console Frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./console/frontend/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=console-frontend-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=console-frontend-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,mode=max,scope=console-frontend-${{ needs.detect-and-prepare.outputs.cache-suffix }}

  build-console-hub:
    name: 🎯 Build Console Hub
    runs-on: ubuntu-latest
    needs: detect-and-prepare
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: needs.detect-and-prepare.outputs.should-push == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/console-hub
          tags: |
            type=raw,value=latest

      - name: Build and push Console Hub image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./console/backend/hub/Dockerfile
          platforms: ${{ needs.detect-and-prepare.outputs.platforms }}
          push: ${{ needs.detect-and-prepare.outputs.should-push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.detect-and-prepare.outputs.version }}
            GIT_COMMIT=${{ needs.detect-and-prepare.outputs.commit-sha }}
            BUILD_TIME=${{ github.run_id }}
          cache-from: |
            type=gha,scope=console-hub-${{ needs.detect-and-prepare.outputs.cache-suffix }}
            ${{ needs.detect-and-prepare.outputs.cache-fallback && format('type=gha,scope=console-hub-{0}', needs.detect-and-prepare.outputs.cache-fallback) || '' }}
          cache-to: type=gha,scope=console-hub-${{ needs.detect-and-prepare.outputs.cache-suffix }},mode=max
          provenance: false
          sbom: false

  # ============================================================================
  # Stage 3: Summary and Notifications
  # ============================================================================
  build-summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs:
      - detect-and-prepare
      - build-core-link
      - build-core-aitools
      - build-core-agent
      - build-core-workflow
      - build-console-frontend
      - build-console-hub
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo "=== 🐳 astron Agent Multi-Service Docker Build Summary ==="
          echo ""
          echo "🔍 Project Detection: ${{ needs.detect-and-prepare.result }}"
          echo "📊 Version: ${{ needs.detect-and-prepare.outputs.version }}"
          echo "📤 Push to Registry: ${{ needs.detect-and-prepare.outputs.should-push }}"
          echo "🏗️ Target Platforms: ${{ needs.detect-and-prepare.outputs.platforms }}"
          echo ""

          echo "🐳 Docker Build Results:"
          echo "  🔗 Core Link: ${{ needs.build-core-link.result }}"
          echo "  🛠️ Core AI Tools: ${{ needs.build-core-aitools.result }}"
          echo "  🤖 Core Agent: ${{ needs.build-core-agent.result }}"
          echo "  ⚡ Core Workflow: ${{ needs.build-core-workflow.result }}"
          echo "  🌐 Console Frontend: ${{ needs.build-console-frontend.result }}"
          echo "  🎯 Console Hub: ${{ needs.build-console-hub.result }}"
          echo ""

          # Count successful builds
          SUCCESS_COUNT=0
          TOTAL_COUNT=10

          [[ "${{ needs.build-core-link.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [[ "${{ needs.build-core-aitools.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [[ "${{ needs.build-core-agent.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [[ "${{ needs.build-core-workflow.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [[ "${{ needs.build-console-frontend.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
          [[ "${{ needs.build-console-hub.result }}" == "success" ]] && SUCCESS_COUNT=$((SUCCESS_COUNT + 1))

          echo "📊 Build Success Rate: $SUCCESS_COUNT/$TOTAL_COUNT images built successfully"

          if [[ "${{ needs.detect-and-prepare.outputs.should-push }}" == "true" ]]; then
            echo ""
            echo "🎯 Published Images:"
            [[ "${{ needs.build-core-link.result }}" == "success" ]] && echo "  🔗 ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-link:${{ needs.detect-and-prepare.outputs.version }}"
            [[ "${{ needs.build-core-aitools.result }}" == "success" ]] && echo "  🛠️ ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-aitools:${{ needs.detect-and-prepare.outputs.version }}"
            [[ "${{ needs.build-core-agent.result }}" == "success" ]] && echo "  🤖 ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-agent:${{ needs.detect-and-prepare.outputs.version }}"
            [[ "${{ needs.build-core-workflow.result }}" == "success" ]] && echo "  ⚡ ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/core-workflow:${{ needs.detect-and-prepare.outputs.version }}"
            [[ "${{ needs.build-console-frontend.result }}" == "success" ]] && echo "  🌐 ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/console-frontend:${{ needs.detect-and-prepare.outputs.version }}"
            [[ "${{ needs.build-console-hub.result }}" == "success" ]] && echo "  🎯 ${{ env.REGISTRY_GHCR }}/${{ github.repository }}/console-hub:${{ needs.detect-and-prepare.outputs.version }}"
          fi

          if [[ "$SUCCESS_COUNT" == "$TOTAL_COUNT" ]]; then
            echo ""
            echo "✅ 🎉 All astron Agent Docker images built successfully!"
            if [[ "${{ needs.detect-and-prepare.outputs.should-push }}" == "true" ]]; then
              echo "🚀 Images are now available in GitHub Container Registry"
            else
              echo "📦 Images built locally (not pushed to registry)"
            fi
          else
            echo ""
            echo "❌ 🚨 Some Docker builds failed - check individual job results"
            exit 1
          fi

          # Additional info for manual workflow dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo ""
            echo "🔧 Manual Workflow Dispatch Summary:"
            echo "  Trigger: ${{ github.actor }}"
            echo "  Ref: ${{ github.ref }}"
            echo "  Push Images: ${{ github.event.inputs.push_images }}"
          fi
